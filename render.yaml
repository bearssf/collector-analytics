# Render Blueprint — deploy from https://github.com/bearssf/AcademiqForge
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: academiqforge
    runtime: node
    region: oregon

    buildCommand: npm ci
    startCommand: npm start

    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "1433"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
